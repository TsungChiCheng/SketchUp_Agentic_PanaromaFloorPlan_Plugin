<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Architech Agent Architecture</title>
  <desc id="desc">Architecture diagram showing SketchUp dialog, remote backend upload and download endpoints, orchestrator intent routing, sub-agent paths, image tools, depth service, and local artifacts.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .box { fill: #ffffff; stroke: #cfd6df; stroke-width: 1.2; rx: 8; }
      .group { fill: #eef2f7; stroke: #c3ccd8; stroke-width: 1.2; rx: 10; }
      .accent { fill: #eef6ff; stroke: #94b7e8; stroke-width: 1.2; rx: 8; }
      .decision { fill: #fff7e8; stroke: #e1b564; stroke-width: 1.2; }
      .store { fill: #f2fbf6; stroke: #8bc79d; stroke-width: 1.2; rx: 8; }
      .title { fill: #202124; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { fill: #202124; font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .t { fill: #30343a; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .m { fill: #68717d; font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .edge { fill: none; stroke: #5d6875; stroke-width: 1.4; marker-end: url(#arrow); }
      .softedge { fill: none; stroke: #8a95a3; stroke-width: 1.2; stroke-dasharray: 5 4; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5d6875"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a95a3"/>
    </marker>
  </defs>

  <rect class="bg" width="1120" height="760"/>
  <text class="title" x="40" y="42">Architech Agent Architecture</text>
  <text class="m" x="40" y="64">Current flow: SketchUp sends all chat prompts to backend orchestration; backend classifies intent and dispatches tools.</text>

  <rect class="group" x="36" y="92" width="268" height="530"/>
  <text class="h" x="56" y="122">SketchUp machine</text>

  <rect class="box" x="56" y="148" width="220" height="78"/>
  <text class="h" x="76" y="174">Agent Dialog</text>
  <text class="t" x="76" y="195">Chat button + prompt + style</text>
  <text class="m" x="76" y="212">latest_png_path, temp prompt</text>

  <rect class="box" x="56" y="260" width="220" height="78"/>
  <text class="h" x="76" y="286">SketchUp Ruby Bridge</text>
  <text class="t" x="76" y="307">Export viewport PNG</text>
  <text class="m" x="76" y="324">Callback: orchestrate_agent</text>

  <rect class="store" x="56" y="548" width="220" height="52"/>
  <text class="h" x="76" y="574">Local Artifacts</text>
  <text class="m" x="76" y="592">outputs/ and pointclouds/</text>

  <rect class="group" x="364" y="92" width="700" height="600"/>
  <text class="h" x="384" y="122">Remote backend machine</text>

  <rect class="accent" x="390" y="148" width="210" height="70"/>
  <text class="h" x="410" y="174">POST /uploads/viewport</text>
  <text class="t" x="410" y="195">Stores exported viewport</text>
  <text class="m" x="410" y="210">backend exports/</text>

  <rect class="accent" x="660" y="148" width="230" height="70"/>
  <text class="h" x="680" y="174">POST /agent/orchestrate</text>
  <text class="t" x="680" y="195">Classifies user intent</text>
  <text class="m" x="680" y="210">generate, edit, discuss, other</text>

  <polygon class="decision" points="775,250 880,315 775,380 670,315"/>
  <text class="h" x="730" y="306">Orchestrator</text>
  <text class="m" x="716" y="326">intent classifier</text>

  <rect class="box" x="390" y="270" width="190" height="74"/>
  <text class="h" x="410" y="296">PromptGenerationAgent</text>
  <text class="t" x="410" y="317">Refine text-to-image</text>
  <text class="m" x="410" y="333">then generate PNG</text>

  <rect class="box" x="390" y="390" width="190" height="74"/>
  <text class="h" x="410" y="416">ImageEditAgent</text>
  <text class="t" x="410" y="437">Use latest PNG</text>
  <text class="m" x="410" y="453">then regenerate PLY</text>

  <rect class="box" x="920" y="270" width="120" height="74"/>
  <text class="h" x="940" y="296">Discuss</text>
  <text class="t" x="940" y="317">No tools</text>
  <text class="m" x="940" y="333">save temp prompt</text>

  <rect class="box" x="920" y="390" width="120" height="74"/>
  <text class="h" x="940" y="416">Other</text>
  <text class="t" x="940" y="437">Clarify</text>
  <text class="m" x="940" y="453">no tool call</text>

  <rect class="accent" x="390" y="510" width="190" height="58"/>
  <text class="h" x="410" y="536">Image tools</text>
  <text class="m" x="410" y="554">generate_png, edit_image</text>

  <rect class="accent" x="660" y="510" width="190" height="58"/>
  <text class="h" x="680" y="536">Depth service</text>
  <text class="m" x="680" y="554">PNG to PLY/LAS/OBJ</text>

  <rect class="store" x="390" y="612" width="460" height="50"/>
  <text class="h" x="410" y="638">Backend Artifacts</text>
  <text class="m" x="410" y="656">exports/, outputs/, pointclouds/</text>

  <rect class="accent" x="884" y="612" width="156" height="50"/>
  <text class="h" x="904" y="638">/artifacts/download</text>
  <text class="m" x="904" y="656">mirror files locally</text>

  <path class="edge" d="M166 226 L166 260"/>
  <path class="edge" d="M276 299 C330 299 330 183 390 183"/>
  <path class="edge" d="M600 183 L660 183"/>
  <path class="edge" d="M775 218 L775 250"/>
  <path class="edge" d="M670 315 L580 307"/>
  <path class="edge" d="M670 330 L580 426"/>
  <path class="edge" d="M880 305 L920 307"/>
  <path class="edge" d="M880 330 L920 426"/>
  <path class="edge" d="M485 344 L485 510"/>
  <path class="edge" d="M485 464 L485 510"/>
  <path class="edge" d="M580 539 L660 539"/>
  <path class="edge" d="M755 568 L620 612"/>
  <path class="edge" d="M485 568 L570 612"/>
  <path class="edge" d="M850 637 L884 637"/>
  <path class="edge" d="M884 637 C720 724 342 688 166 600"/>
  <path class="softedge" d="M166 548 C166 488 166 390 166 338"/>

  <text class="m" x="304" y="286">upload viewport bytes</text>
  <text class="m" x="700" y="242">route request</text>
  <text class="m" x="600" y="496">generated PNG</text>
  <text class="m" x="816" y="596">remote files</text>
  <text class="m" x="476" y="714">download PNG, depth preview, and point cloud for local preview/reveal/import</text>
</svg>
