<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PanoramaFloorPlan Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202124;
        background: #f5f6f8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f6f8;
      }

      main {
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        width: min(620px, 100vw);
        height: 100vh;
        margin: 0 auto;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
      }

      .status {
        max-width: 260px;
        color: #6f7782;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .thread {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        overflow: auto;
        padding: 2px 2px 10px;
      }

      .message {
        max-width: 86%;
        border: 1px solid #d8dde6;
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .message.user {
        align-self: flex-end;
        border-color: #b9c8e8;
        background: #eef4ff;
      }

      .message.agent {
        align-self: flex-start;
      }

      .message.pending {
        color: #6f7782;
      }

      .hint {
        margin-top: 10px;
        color: #6f7782;
        font-size: 12px;
      }

      .timestamp {
        display: block;
        margin-top: 6px;
        color: #8a929c;
        font-size: 11px;
      }

      .choice-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .choice-row button {
        border: 1px solid #c8ced8;
        border-radius: 999px;
        padding: 6px 10px;
        background: #ffffff;
        color: #202124;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .choice-row button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .artifact-grid {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .artifact {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid #edf0f4;
        border-radius: 6px;
        background: #fafbfc;
        font-size: 12px;
      }

      .artifact strong {
        color: #4d535b;
        font-weight: 650;
      }

      .artifact span {
        color: #6f7782;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .preview-grid img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: contain;
        border: 1px solid #d8dde6;
        border-radius: 6px;
        background: #f0f2f5;
      }

      .preview-grid img.clickable-preview {
        cursor: zoom-in;
      }

      .preview-grid img.clickable-preview:focus {
        outline: 2px solid #9fb7dc;
        outline-offset: 2px;
      }

      .preview-grid img.panorama-preview {
        aspect-ratio: 16 / 9;
      }

      .composer {
        border: 1px solid #d8dde6;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 74px;
        max-height: 160px;
        border: 0;
        outline: 0;
        resize: vertical;
        font: inherit;
        line-height: 1.45;
        color: #202124;
        background: transparent;
      }

      .composer-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid #edf0f4;
        padding-top: 8px;
        margin-top: 8px;
        color: #6f7782;
        font-size: 12px;
      }

      .composer-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chat-button {
        border: 1px solid #9fb7dc;
        border-radius: 6px;
        padding: 6px 12px;
        background: #edf4ff;
        color: #153e75;
        font: inherit;
        font-size: 12px;
        font-weight: 650;
        cursor: pointer;
      }

      .chat-button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      select {
        min-width: 0;
        max-width: 260px;
        border: 1px solid #c8ced8;
        border-radius: 6px;
        padding: 6px 8px;
        font: inherit;
        color: #202124;
        background: #ffffff;
      }

      pre {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>PanoramaFloorPlan Agent</h1>
        <div id="status" class="status">Ready.</div>
      </header>

      <section id="thread" class="thread" aria-live="polite"></section>

      <section class="composer">
        <textarea id="prompt" placeholder="Ask PanoramaFloorPlan to render this view and create a point cloud..."></textarea>
        <div class="composer-meta">
          <select id="style"></select>
          <div class="composer-actions">
            <button id="chat" class="chat-button" type="button">Chat</button>
          </div>
        </div>
      </section>

      <pre id="result"></pre>
    </main>

    <script>
      const thread = document.getElementById("thread");
      const style = document.getElementById("style");
      const promptInput = document.getElementById("prompt");
      const statusOutput = document.getElementById("status");
      const resultOutput = document.getElementById("result");
      const chatButton = document.getElementById("chat");
      let isRunning = false;
      let runningOperation = null;
      let runningStartedAt = null;
      let runningTimeoutId = null;
      let pendingMessage = null;
      let lastPng = null;
      let lastPointCloud = null;
      let lastFloorPlan = null;
      let lastPanorama = null;
      let pendingPointCloudContext = null;
      let backendUrl = "";
      let temporaryTextToImagePrompt = "";
      let temporaryFloorPlanDraft = null;
      let pointCloudImportCapability = {
        supported: false,
        message: "Direct SketchUp point-cloud import support was not detected."
      };
      function setStatus(message) {
        statusOutput.textContent = message;
      }

      function setRunning(value, operation = null, timeoutMs = null) {
        if (runningTimeoutId) {
          clearTimeout(runningTimeoutId);
          runningTimeoutId = null;
        }
        isRunning = value;
        runningOperation = value ? operation : null;
        runningStartedAt = value ? Date.now() : null;
        chatButton.disabled = value;
        if (value && timeoutMs) {
          runningTimeoutId = setTimeout(() => {
            if (!isRunning || runningOperation !== operation) return;
            setRunning(false);
            removePendingMessage();
            setStatus(`${operation || "Operation"} timed out.`);
            appendMessage("agent", `${operation || "Operation"} is taking too long. The backend may still finish; check backend logs or try again after it completes.`);
          }, timeoutMs);
        }
      }

      function setResult(value) {
        resultOutput.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function scrollThread() {
        thread.scrollTop = thread.scrollHeight;
      }

      function appendMessage(role, text, className = "") {
        const message = document.createElement("article");
        message.className = `message ${role} ${className}`.trim();
        message.append(document.createTextNode(text));
        appendTimestamp(message);
        thread.appendChild(message);
        scrollThread();
        return message;
      }

      function appendTimestamp(element, timestamp = null) {
        const time = document.createElement("time");
        time.className = "timestamp";
        const date = timestamp ? new Date(timestamp) : new Date();
        time.dateTime = date.toISOString();
        time.textContent = date.toLocaleString();
        element.appendChild(time);
      }

      function artifactCard(label, value) {
        const row = document.createElement("div");
        row.className = "artifact";
        const title = document.createElement("strong");
        title.textContent = label;
        const content = document.createElement("span");
        content.textContent = value || "None";
        row.append(title, content);
        return row;
      }

      function previewImage(url, alt, options = {}) {
        if (!url) return null;
        const image = document.createElement("img");
        image.src = url.startsWith("data:") ? url : `${url}?t=${Date.now()}`;
        image.alt = alt;
        if (options.clickable) {
          image.tabIndex = 0;
          image.role = "button";
          image.title = options.title || "Open preview";
          image.classList.add("clickable-preview");
          image.addEventListener("click", options.onClick);
          image.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              options.onClick();
            }
          });
        }
        return image;
      }

      function appendAgentResult(payload) {
        const png = payload.png || {};
        const pointCloud = payload.point_cloud || {};
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(
          payload.status === "success"
            ? "Done. I generated the render and point cloud."
            : (payload.error_message || "I need more information before I can generate an image.")
        ));
        appendTimestamp(message, payload.completed_at || payload.started_at);

        if (payload.status === "success") {
          lastPng = png;
          lastPointCloud = pointCloud;
          const artifacts = document.createElement("div");
          artifacts.className = "artifact-grid";
          artifacts.append(
            artifactCard("Render", png.output_image_path || png.local_output_image_path),
            artifactCard("Point Cloud", pointCloud.pointcloud_path || pointCloud.local_pointcloud_path)
          );
          message.appendChild(artifacts);
          appendPointCloudImportNote(message, pointCloud);
          message.appendChild(importChoices(png, pointCloud));
        }

        const renderPreview = previewImage(png.render_preview_url, "Generated render preview");
        const depthPreview = previewImage(pointCloud.pointcloud_preview_url, "Generated depth preview");
        if (renderPreview || depthPreview) {
          const previews = document.createElement("div");
          previews.className = "preview-grid";
          if (renderPreview) previews.appendChild(renderPreview);
          if (depthPreview) previews.appendChild(depthPreview);
          message.appendChild(previews);
        }

        thread.appendChild(message);
        scrollThread();
      }

      function appendEditResult(payload) {
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(
          payload.status === "success"
            ? "Done. I edited the latest render."
            : (payload.error_message || "I could not edit the latest render.")
        ));
        appendTimestamp(message);

        if (payload.status === "success") {
          const png = {
            output_image_path: payload.output_image_path,
            local_output_image_path: payload.local_output_image_path,
            render_preview_url: payload.render_preview_url
          };
          lastPng = png;
          lastPointCloud = null;

          const artifacts = document.createElement("div");
          artifacts.className = "artifact-grid";
          artifacts.append(artifactCard("Render", png.output_image_path || png.local_output_image_path));
          message.appendChild(artifacts);

          const choices = document.createElement("div");
          choices.className = "choice-row";
          choices.append(
            choiceButton("Import PNG", () => importPng(png)),
            choiceButton("Estimate Depth", () => generatePointCloud(png))
          );
          message.appendChild(choices);

          const renderPreview = previewImage(png.render_preview_url, "Edited render preview");
          if (renderPreview) {
            const previews = document.createElement("div");
            previews.className = "preview-grid";
            previews.appendChild(renderPreview);
            message.appendChild(previews);
          }
        }

        thread.appendChild(message);
        scrollThread();
      }

      function appendFloorPlanDraft(payload) {
        const draft = payload.floor_plan_draft || temporaryFloorPlanDraft || {};
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(payload.message || "I updated the floor-plan draft."));
        appendTimestamp(message);

        const artifacts = document.createElement("div");
        artifacts.className = "artifact-grid";
        artifacts.append(
          artifactCard("Rooms", (draft.rooms || []).map((room) => `${room.name} ${room.width}x${room.depth}`).join(", ") || "None"),
          artifactCard("Missing", (payload.floor_plan_missing_fields || []).join(", ") || "Ready")
        );
        message.appendChild(artifacts);

        if (payload.floor_plan_ready) {
          const choices = document.createElement("div");
          choices.className = "choice-row";
          choices.append(choiceButton("Plot Floor Plan", () => plotFloorPlan(), { disableSiblings: false }));
          message.appendChild(choices);
        }

        thread.appendChild(message);
        scrollThread();
      }

      function appendFloorPlanResult(payload) {
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(
          payload.status === "success"
            ? "Done. I plotted the floor plan."
            : (payload.error_message || "Floor-plan plotting failed.")
        ));
        appendTimestamp(message);

        if (payload.status === "success") {
          lastFloorPlan = payload;
          const artifacts = document.createElement("div");
          artifacts.className = "artifact-grid";
          artifacts.append(
            artifactCard("SVG", payload.svg_path || payload.local_svg_path),
            artifactCard("Decor", payload.decoration_path || payload.local_decoration_path),
            artifactCard("Preview", payload.preview_image_path || payload.local_preview_image_path)
          );
          message.appendChild(artifacts);

          const previewUrl = payload.floor_plan_svg_url || payload.floor_plan_preview_url;
          const preview = previewImage(previewUrl, "Floor plan preview", {
            clickable: true,
            title: "Open floor plan in a larger window",
            onClick: () => openFloorPlanViewer(payload)
          });
          if (preview) {
            const previews = document.createElement("div");
            previews.className = "preview-grid";
            previews.appendChild(preview);
            message.appendChild(previews);
          }

          const choices = document.createElement("div");
          choices.className = "choice-row";
          choices.append(choiceButton("Generate Room Renders", () => generateRoomRenders(payload), { disableSiblings: false }));
          if (payload.decoration_path || payload.local_decoration_path) {
            choices.append(choiceButton("Generate Panorama", () => generatePanorama(payload), { disableSiblings: false }));
          }
          message.appendChild(choices);
        }

        thread.appendChild(message);
        scrollThread();
      }

      function appendPanoramaResult(payload) {
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(
          payload.status === "success"
            ? "Done. I generated the floor-plan panorama."
            : (payload.error_message || "Panorama generation failed.")
        ));
        appendTimestamp(message);

        if (payload.status === "success") {
          lastPanorama = payload;
          const panoramaPaths = payload.panorama_image_paths && payload.panorama_image_paths.length
            ? payload.panorama_image_paths
            : [payload.panorama_image_path].filter(Boolean);
          const artifacts = document.createElement("div");
          artifacts.className = "artifact-grid";
          panoramaPaths.forEach((path, index) => {
            artifacts.appendChild(artifactCard(`Option ${index + 1}`, path));
          });
          message.appendChild(artifacts);

          const previewUrls = payload.panorama_preview_urls && payload.panorama_preview_urls.length
            ? payload.panorama_preview_urls
            : [payload.panorama_preview_url].filter(Boolean);
          if (previewUrls.length) {
            const previews = document.createElement("div");
            previews.className = "preview-grid";
            previewUrls.forEach((url, index) => {
              const preview = previewImage(url, `Generated panorama option ${index + 1}`, {
                clickable: true,
                title: `Open panorama option ${index + 1} in a larger window`,
                onClick: () => openImageViewer({
                  image_url: url,
                  image_path: panoramaPaths[index],
                  title: `Panorama Option ${index + 1}`
                })
              });
              if (preview) {
                preview.classList.add("panorama-preview");
                preview.title = `Panorama option ${index + 1}`;
                previews.appendChild(preview);
              }
            });
            message.appendChild(previews);
          } else if (payload.panorama_preview_error) {
            const warning = document.createElement("div");
            warning.className = "hint";
            warning.textContent = payload.panorama_preview_error;
            message.appendChild(warning);
          }

          const choices = document.createElement("div");
          choices.className = "choice-row";
          panoramaPaths.forEach((path, index) => {
            choices.appendChild(choiceButton(`Select ${index + 1} and Convert point cloud`, () => {
              payload.selected_panorama_image_path = path;
              payload.selected_panorama_index = index + 1;
              appendMessage("agent", `Selected panorama option ${index + 1}. Converting it to a point cloud.`);
              generatePointCloud(
                { output_image_path: path },
                {
                  sourceType: "panorama",
                  sourceLabel: `Panorama option ${index + 1}`,
                  sourceImagePath: path,
                  sourcePreviewUrl: previewUrls[index] || payload.panorama_preview_url || ""
                }
              );
            }));
          });
          message.appendChild(choices);

          if (payload.scene_description) {
            const note = document.createElement("div");
            note.className = "hint";
            note.textContent = payload.scene_description;
            message.appendChild(note);
          }
        }

        thread.appendChild(message);
        scrollThread();
      }

      function appendRoomRenderResult(payload, options = {}) {
        const rooms = payload.rooms || [];
        const floorPlan = options.floorPlan || null;
        const message = document.createElement("article");
        message.className = "message agent";
        message.append(document.createTextNode(
          payload.status === "success"
            ? `Done. I generated ${rooms.length} room render${rooms.length === 1 ? "" : "s"}.`
            : (payload.error_message || "Room rendering failed.")
        ));
        appendTimestamp(message);

        if (rooms.length > 0) {
          const artifacts = document.createElement("div");
          artifacts.className = "artifact-grid";
          rooms.forEach((room) => {
            artifacts.append(artifactCard(room.room_name || "Room", room.output_image_path || room.local_output_image_path || room.error_message));
          });
          message.appendChild(artifacts);

          const previews = document.createElement("div");
          previews.className = "preview-grid";
          rooms.forEach((room) => {
            const preview = previewImage(room.render_preview_url, `${room.room_name || "Room"} render preview`);
            if (preview) previews.appendChild(preview);
          });
          if (floorPlan && (floorPlan.floor_plan_svg_url || floorPlan.floor_plan_preview_url)) {
            const floorPlanPreview = previewImage(floorPlan.floor_plan_svg_url || floorPlan.floor_plan_preview_url, "Floor plan preview", {
              clickable: true,
              title: "Open floor plan in a larger window",
              onClick: () => openFloorPlanViewer(floorPlan)
            });
            if (floorPlanPreview) previews.appendChild(floorPlanPreview);
          }
          if (previews.children.length > 0) {
            message.appendChild(previews);
          }

          const firstSuccess = rooms.find((room) => room.status === "success" && room.output_image_path);
          if (firstSuccess) {
            lastPng = firstSuccess;
            const choices = document.createElement("div");
            choices.className = "choice-row";
            choices.append(choiceButton("Import First PNG", () => importPng(firstSuccess)));
            message.appendChild(choices);
          }
        }

        thread.appendChild(message);
        scrollThread();
      }

      function openFloorPlanViewer(payload) {
        const svgPath = payload.local_svg_path || (isLocalArtifactPath(payload.svg_path) ? payload.svg_path : null);
        const svgUrl = payload.floor_plan_svg_url || payload.floor_plan_preview_url;
        if (!svgPath && !svgUrl) {
          appendMessage("agent", "I do not have a floor-plan SVG to open.");
          return;
        }
        if (!hasSketchUpCallback("open_floor_plan_viewer")) return;
        sketchup.open_floor_plan_viewer(JSON.stringify({
          svg_path: svgPath,
          svg_url: svgUrl,
          title: payload.artifact_id ? `Floor Plan ${payload.artifact_id}` : "Floor Plan"
        }));
      }

      function openImageViewer(payload) {
        const imageUrl = payload.image_url || "";
        const imagePath = payload.image_path || "";
        if (!imageUrl && !imagePath) {
          appendMessage("agent", "I do not have an image preview to open.");
          return;
        }
        if (!hasSketchUpCallback("open_image_viewer")) return;
        sketchup.open_image_viewer(JSON.stringify({
          image_url: imageUrl,
          image_path: imagePath,
          title: payload.title || "Image Preview"
        }));
      }

      function isLocalArtifactPath(path) {
        return Boolean(path) && !String(path).startsWith("/app/");
      }

      function importChoices(png, pointCloud) {
        const choices = document.createElement("div");
        choices.className = "choice-row";
        choices.append(choiceButton("Import PNG", () => importPng(png)));
        appendPointCloudChoices(choices, pointCloud);
        return choices;
      }

      function appendPointCloudChoices(choices, pointCloud) {
        if (!pointCloud || !pointCloud.pointcloud_path) return;

        choices.append(choiceButton(revealPointCloudLabel(pointCloud), () => revealPointCloud(pointCloud), { disableSiblings: false }));
        if (canImportPointCloud(pointCloud)) {
          choices.append(choiceButton(importPointCloudLabel(pointCloud), () => importPointCloud(pointCloud)));
        }
      }

      function appendPointCloudImportNote(message, pointCloud) {
        if (!pointCloud || !pointCloud.pointcloud_path || canImportPointCloud(pointCloud)) return;

        const note = document.createElement("div");
        note.className = "hint";
        note.textContent = `${pointCloudImportCapability.message} Use ${revealPointCloudLabel(pointCloud)} and import manually through Scan Essentials.`;
        message.appendChild(note);
      }

      function pointCloudFormat(pointCloud) {
        if (pointCloud && pointCloud.output_format) return pointCloud.output_format.toUpperCase();
        const path = (pointCloud && pointCloud.pointcloud_path ? pointCloud.pointcloud_path : "").toLowerCase();
        if (path.endsWith(".obj")) return "OBJ";
        if (path.endsWith(".ply")) return "PLY";
        if (path.endsWith(".las")) return "LAS";
        if (path.endsWith(".laz")) return "LAZ";
        return "Point Cloud";
      }

      function canImportPointCloud(pointCloud) {
        const format = pointCloudFormat(pointCloud);
        return format === "OBJ" || (["PLY", "LAS", "LAZ"].includes(format) && pointCloudImportCapability.supported);
      }

      function revealPointCloudLabel(pointCloud) {
        return `Reveal ${pointCloudFormat(pointCloud)}`;
      }

      function importPointCloudLabel(pointCloud) {
        return `Import ${pointCloudFormat(pointCloud)}`;
      }

      function choiceButton(label, onClick, options = {}) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", () => {
          if (options.disableSiblings !== false) {
            disableChoiceButtons(button.parentElement);
          }
          onClick();
        });
        return button;
      }

      function disableChoiceButtons(container) {
        if (!container) return;
        container.querySelectorAll("button").forEach((button) => {
          button.disabled = true;
        });
      }

      function importPng(png) {
        const outputImagePath = png.output_image_path;
        if (!outputImagePath) {
          appendMessage("agent", "I do not have a PNG artifact to import.");
          return;
        }
        if (!hasSketchUpCallback("import_render")) return;
        setStatus("Importing PNG...");
        sketchup.import_render(JSON.stringify({ output_image_path: outputImagePath }));
      }

      function importPointCloud(pointCloud) {
        const pointcloudPath = pointCloud.pointcloud_path;
        if (!pointcloudPath) {
          appendMessage("agent", "I do not have a point-cloud artifact to import.");
          return;
        }
        if (!hasSketchUpCallback("import_point_cloud")) return;
        setStatus(`Importing ${pointCloudFormat(pointCloud)}...`);
        sketchup.import_point_cloud(JSON.stringify({ pointcloud_path: pointcloudPath }));
      }

      function revealPointCloud(pointCloud) {
        const pointcloudPath = pointCloud.pointcloud_path;
        if (!pointcloudPath) {
          appendMessage("agent", "I do not have a point-cloud artifact to reveal.");
          return;
        }
        if (!hasSketchUpCallback("reveal_point_cloud")) return;
        setStatus(`Revealing ${pointCloudFormat(pointCloud)}...`);
        sketchup.reveal_point_cloud(JSON.stringify({ pointcloud_path: pointcloudPath }));
      }

      function generatePointCloud(png, options = {}) {
        const outputImagePath = png.output_image_path;
        if (!outputImagePath) {
          appendMessage("agent", "I do not have a PNG artifact to convert.");
          return;
        }
        if (!hasSketchUpCallback("generate_point_cloud")) return;
        setRunning(true);
        setStatus("Estimating depth...");
        pendingMessage = appendMessage("agent", "Estimating depth and generating a PLY point cloud...", "pending");
        pendingPointCloudContext = {
          sourceType: options.sourceType || "image",
          sourceLabel: options.sourceLabel || "Source image",
          sourceImagePath: options.sourceImagePath || outputImagePath,
          sourcePreviewUrl: options.sourcePreviewUrl || png.render_preview_url || ""
        };
        try {
          sketchup.generate_point_cloud(JSON.stringify({ output_image_path: outputImagePath, output_format: "ply" }));
        } catch (error) {
          pendingPointCloudContext = null;
          removePendingMessage();
          setRunning(false);
          setStatus("Point-cloud routing failed.");
          appendMessage("agent", `Could not call generate_point_cloud: ${error.message || error}`);
        }
      }

      function generateRoomRenders(floorPlan = null) {
        if (isRunning) {
          appendMessage("agent", "I am already running a request.");
          return;
        }
        const activeFloorPlan = floorPlan || lastFloorPlan;
        const decorationPath = activeFloorPlan && (activeFloorPlan.decoration_path || activeFloorPlan.local_decoration_path);
        if (!decorationPath) {
          appendMessage("agent", "I need a plotted floor-plan layout before rendering rooms.");
          return;
        }
        if (!backendUrl) {
          appendMessage("agent", "I do not have a backend URL yet. Restart SketchUp to reload the synced extension.");
          return;
        }
        setRunning(true, "Room renders", 300000);
        setStatus("Rendering rooms...");
        pendingMessage = appendMessage("agent", "Generating room renders from the floor-plan layout...", "pending");
        const payload = buildOrchestratePayload("generate room renders");
        payload.latest_floor_plan_decoration_path = decorationPath;
        payload.temporary_floor_plan_draft = temporaryFloorPlanDraft;
        payload.selected_room_names = [];
        runDirectFloorPlanOrchestration(payload);
      }

      async function generatePanorama(floorPlan = null) {
        if (isRunning) {
          appendMessage("agent", "I am already running a request.");
          return;
        }
        const activeFloorPlan = floorPlan || lastFloorPlan;
        const decorationPath = activeFloorPlan && (activeFloorPlan.decoration_path || activeFloorPlan.local_decoration_path);
        if (!decorationPath) {
          appendMessage("agent", "I need a plotted floor-plan JSON before generating a panorama.");
          return;
        }
        if (!backendUrl) {
          appendMessage("agent", "I do not have a backend URL yet. Restart SketchUp to reload the synced extension.");
          return;
        }
        setRunning(true, "Panorama", 720000);
        setStatus("Generating panorama...");
        pendingMessage = appendMessage("agent", "Generating a panorama from the floor-plan JSON...", "pending");
        try {
          const response = await postBackend("/generate/panorama", {
            decoration_path: decorationPath,
            style: style.value,
            output_resolution: "1024x576"
          });
          const hydrated = await hydratePanoramaResult(response);
          setRunning(false);
          removePendingMessage();
          setStatus(hydrated.status === "success" ? "Panorama complete." : "Panorama failed.");
          appendPanoramaResult(hydrated);
          setResult(hydrated);
        } catch (error) {
          removePendingMessage();
          setRunning(false);
          setStatus("Backend request failed.");
          appendMessage("agent", `Could not generate panorama: ${error.message || error}`);
        }
      }

      function plotFloorPlan(draft = null) {
        if (isRunning) {
          if (runningOperation === "Floor-plan plot" && runningStartedAt) {
            const elapsedSeconds = Math.max(1, Math.round((Date.now() - runningStartedAt) / 1000));
            appendMessage("agent", `Still plotting the floor plan (${elapsedSeconds}s elapsed). Wait for the result or check backend logs if it takes several minutes.`);
          } else {
            appendMessage("agent", "I am already running a request.");
          }
          return;
        }
        const activeDraft = temporaryFloorPlanDraft || draft;
        if (!activeDraft || !activeDraft.rooms || activeDraft.rooms.length === 0) {
          appendMessage("agent", "I do not have enough floor-plan details to plot.");
          return;
        }
        setRunning(true, "Floor-plan plot", 300000);
        setStatus("Plotting floor plan...");
        pendingMessage = appendMessage("agent", "Plotting the floor plan...", "pending");
        if (!backendUrl) {
          removePendingMessage();
          setRunning(false);
          setStatus("Backend URL unavailable.");
          appendMessage("agent", "I do not have a backend URL yet. Restart SketchUp to reload the synced extension.");
          return;
        }
        const payload = buildOrchestratePayload("plot the floor plan");
        payload.temporary_floor_plan_draft = activeDraft;
        runDirectFloorPlanOrchestration(payload);
      }

      function removePendingMessage() {
        if (pendingMessage) {
          pendingMessage.remove();
          pendingMessage = null;
        }
      }

      function runAgentPipeline() {
        if (isRunning) return;
        const prompt = promptInput.value.trim();
        const floorPlanPrompt = isFloorPlanPrompt(prompt) || Boolean(temporaryFloorPlanDraft);
        const callbackName = "orchestrate_agent";
        if (!floorPlanPrompt && (!window.sketchup || typeof sketchup[callbackName] !== "function")) {
          setStatus("Plugin callback unavailable.");
          appendMessage("agent", `${callbackName} is unavailable. Restart SketchUp to load the synced extension. Backend URL: ${backendUrl || "unknown"}`);
          return;
        }
        setRunning(true);
        setResult("");
        appendMessage("user", prompt || "Render this SketchUp view and create a point cloud.");
        pendingMessage = appendMessage(
          "agent",
          "Routing the request...",
          "pending"
        );
        setStatus(`Routing to ${backendUrl || "backend"}...`);
        promptInput.value = "";
        const requestPayload = buildOrchestratePayload(prompt);
        if (floorPlanPrompt && backendUrl) {
          runDirectFloorPlanOrchestration(requestPayload);
          return;
        }
        try {
          sketchup[callbackName](JSON.stringify(requestPayload));
        } catch (error) {
          removePendingMessage();
          setRunning(false);
          setStatus("Routing failed.");
          appendMessage("agent", `Could not call ${callbackName}: ${error.message || error}. Backend URL: ${backendUrl || "unknown"}`);
        }
      }

      function isFloorPlanPrompt(prompt) {
        return /\b(floor\s*plan|floorplan|room\s*layout|plot\s+the\s+floor\s*plan|generate\s+room\s+renders|room\s*render|text2room|adjacent|door|doors|opening|entrance|hallway|corridor)\b|\d+\s*(?:x|by|×)\s*\d+/i.test(prompt || "");
      }

      function hasSketchUpCallback(name) {
        if (window.sketchup && typeof sketchup[name] === "function") return true;
        setStatus("Plugin callback unavailable.");
        appendMessage("agent", `${name} is unavailable. Restart SketchUp to load the synced extension. Backend URL: ${backendUrl || "unknown"}`);
        return false;
      }

      function buildOrchestratePayload(prompt) {
        return {
          project_id: "sketchup-local",
          viewport_image_path: "floor_plan_placeholder.png",
          style: style.value,
          user_prompt: prompt,
          latest_png_path: lastPng && lastPng.output_image_path ? lastPng.output_image_path : null,
          temporary_text_to_image_prompt: temporaryTextToImagePrompt,
          temporary_floor_plan_draft: temporaryFloorPlanDraft,
          latest_floor_plan_decoration_path: lastFloorPlan && (lastFloorPlan.decoration_path || lastFloorPlan.local_decoration_path) ? (lastFloorPlan.decoration_path || lastFloorPlan.local_decoration_path) : null,
          camera: {
            position: [0, 0, 1.6],
            direction: [0, 1, 0],
            target: [0, 1, 1.6],
            fov: 45
          },
          model: {
            bounds: { width: 0, depth: 0, height: 0 },
            materials: [],
            selected_entity_count: 0
          },
          render_options: {
            preserve_geometry: true,
            preserve_camera: true,
            output_resolution: "1024x1024"
          },
          view: {
            yaw: 0,
            pitch: 0,
            roll: 0
          }
        };
      }

      async function runDirectFloorPlanOrchestration(payload) {
        try {
          const backendPayload = Object.assign({}, payload);
          delete backendPayload.view;
          const response = await postBackend("/agent/orchestrate", backendPayload);
          const hydrated = await hydrateDirectOrchestrateResult(response);
          window.PanoramaFloorPlanRenderer.receiveOrchestrateResult(hydrated);
        } catch (error) {
          removePendingMessage();
          setRunning(false);
          setStatus("Backend request failed.");
          appendMessage("agent", `Could not reach ${backendUrl}: ${error.message || error}`);
        }
      }

      async function postBackend(path, payload) {
        const base = backendUrl.replace(/\/+$/, "");
        const response = await fetch(`${base}${path}`, {
          method: "POST",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        const text = await response.text();
        let parsed = null;
        try {
          parsed = text ? JSON.parse(text) : {};
        } catch (error) {
          throw new Error(`Backend returned invalid JSON: ${text.slice(0, 160)}`);
        }
        if (!response.ok) {
          throw new Error(parsed.detail || parsed.error_message || response.statusText);
        }
        return parsed;
      }

      async function hydrateDirectOrchestrateResult(payload) {
        if (payload.png && payload.png.output_image_path) {
          payload.png.render_preview_url = await downloadArtifactDataUrl(payload.png.output_image_path, "image/png");
        }
        if (payload.point_cloud && payload.point_cloud.preview_image_path) {
          payload.point_cloud.pointcloud_preview_url = await downloadArtifactDataUrl(payload.point_cloud.preview_image_path, "image/png");
        }
        if (payload.floor_plan) {
          await hydrateDirectFloorPlan(payload.floor_plan);
        }
        if (payload.room_renders && payload.room_renders.rooms) {
          for (const room of payload.room_renders.rooms) {
            if (room.output_image_path) {
              room.render_preview_url = await downloadArtifactDataUrl(room.output_image_path, "image/png");
            }
          }
        }
        return payload;
      }

      async function hydratePanoramaResult(payload) {
        const paths = payload.panorama_image_paths && payload.panorama_image_paths.length
          ? payload.panorama_image_paths
          : [payload.panorama_image_path].filter(Boolean);
        if (paths.length) {
          const previews = await Promise.all(paths.map(async (path) => {
            try {
              return await downloadArtifactDataUrl(path, "image/png");
            } catch (error) {
              return null;
            }
          }));
          payload.panorama_preview_urls = previews.filter(Boolean);
          payload.panorama_preview_url = payload.panorama_preview_urls[0];
          if (payload.panorama_preview_urls.length === 0) {
            payload.panorama_preview_error = "Panorama artifacts were generated, but preview download failed. Use the artifact paths above or check backend artifact download logs.";
          }
        }
        return payload;
      }

      async function hydrateDirectFloorPlan(floorPlan) {
        if (floorPlan.svg_path) {
          floorPlan.floor_plan_svg_url = await downloadArtifactDataUrl(floorPlan.svg_path, "image/svg+xml");
        }
        if (floorPlan.preview_image_path) {
          floorPlan.floor_plan_preview_url = await downloadArtifactDataUrl(floorPlan.preview_image_path, "image/png");
        }
      }

      async function downloadArtifactDataUrl(path, mimeType) {
        const artifact = await postBackend("/artifacts/download", { path });
        return `data:${mimeType};base64,${artifact.content_base64}`;
      }

      window.PanoramaFloorPlanRenderer = {
        receiveInitialState(payload) {
          backendUrl = payload.backend_url || "";
          pointCloudImportCapability = payload.point_cloud_import || pointCloudImportCapability;
          style.textContent = "";
          payload.styles.forEach((preset) => {
            const option = document.createElement("option");
            option.value = preset;
            option.textContent = preset;
            style.appendChild(option);
          });
          setStatus(`Backend: ${payload.backend_url}`);
          appendMessage("agent", `Ready. Backend: ${payload.backend_url}. UI: ${payload.ui_version || "unknown"}. Tell me what to render from the current SketchUp view.`);
          if (window.sketchup && typeof sketchup.health_check === "function") {
            sketchup.health_check();
          }
        },
        receiveHealth(payload) {
          setStatus(payload.status === "ok" ? "Backend is healthy." : "Backend check failed.");
          setResult(payload);
        },
        receiveRenderResult(payload) {
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Render complete." : "Render failed.");
          setResult(payload);
        },
        receiveImportResult(payload) {
          setStatus(payload.status === "success" ? "Rendered image imported." : "Import failed.");
          appendMessage(
            "agent",
            payload.status === "success"
              ? `Imported PNG into SketchUp: ${payload.imported_image_path}`
              : (payload.error_message || "PNG import failed.")
          );
          setResult(payload);
        },
        receivePointCloudRevealResult(payload) {
          setStatus(payload.status === "success" ? "Point cloud revealed." : "Reveal point cloud failed.");
          appendMessage(
            "agent",
            payload.status === "success"
              ? `Revealed point cloud: ${payload.revealed_pointcloud_path}`
              : (payload.error_message || "Reveal point cloud failed.")
          );
          setResult(payload);
        },
        receivePointCloudImportResult(payload) {
          setStatus(payload.status === "success" ? "Point cloud imported." : "Point-cloud import failed.");
          appendMessage(
            "agent",
            payload.status === "success"
              ? `Imported point cloud into SketchUp: ${payload.imported_pointcloud_path}`
              : (payload.error_message || "Point-cloud import failed.")
          );
          setResult(payload);
        },
        receivePointCloudResult(payload) {
          const pointCloudContext = pendingPointCloudContext;
          pendingPointCloudContext = null;
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Point cloud complete." : "Point cloud failed.");
          if (payload.status === "success") {
            lastPointCloud = payload;
            const message = document.createElement("article");
            message.className = "message agent";
            message.append(document.createTextNode("Done. I estimated depth and generated the point cloud."));
            appendTimestamp(message);
            const artifacts = document.createElement("div");
            artifacts.className = "artifact-grid";
            artifacts.append(
              artifactCard("Point Cloud", payload.pointcloud_path || payload.local_pointcloud_path),
              artifactCard("Depth Model", payload.depth_model),
              artifactCard("Source", pointCloudContext ? pointCloudContext.sourceLabel : "Image")
            );
            message.appendChild(artifacts);
            appendPointCloudImportNote(message, payload);
            const choices = document.createElement("div");
            choices.className = "choice-row";
            appendPointCloudChoices(choices, payload);
            message.appendChild(choices);
            const depthPreviewUrl = payload.pointcloud_preview_url || "";
            const depthPreviewPath = payload.local_preview_image_path || payload.preview_image_path || "";
            const depthPreview = previewImage(depthPreviewUrl, "Generated depth preview", {
              clickable: Boolean(depthPreviewUrl || depthPreviewPath),
              title: "Open depth preview in a larger window",
              onClick: () => openImageViewer({
                image_url: depthPreviewUrl,
                image_path: depthPreviewPath,
                title: pointCloudContext && pointCloudContext.sourceType === "panorama"
                  ? `${pointCloudContext.sourceLabel} Depth Preview`
                  : "Depth Preview"
              })
            });
            const sourcePreview = pointCloudContext && pointCloudContext.sourcePreviewUrl
              ? previewImage(pointCloudContext.sourcePreviewUrl, `${pointCloudContext.sourceLabel} preview`, {
                clickable: true,
                title: `Open ${pointCloudContext.sourceLabel} in a larger window`,
                onClick: () => openImageViewer({
                  image_url: pointCloudContext.sourcePreviewUrl,
                  image_path: pointCloudContext.sourceImagePath || "",
                  title: pointCloudContext.sourceLabel
                })
              })
              : null;
            if (pointCloudContext && pointCloudContext.sourceType === "panorama") {
              if (sourcePreview) sourcePreview.classList.add("panorama-preview");
              if (depthPreview) depthPreview.classList.add("panorama-preview");
            }
            if (sourcePreview || depthPreview) {
              const previews = document.createElement("div");
              previews.className = "preview-grid";
              if (sourcePreview) previews.appendChild(sourcePreview);
              if (depthPreview) previews.appendChild(depthPreview);
              message.appendChild(previews);
            }
            thread.appendChild(message);
            scrollThread();
          } else {
            appendMessage("agent", payload.error_message || "Point cloud failed.");
          }
          setResult(payload);
        },
        receiveFloorPlanResult(payload) {
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Floor plan complete." : "Floor plan failed.");
          appendFloorPlanResult(payload);
          setResult(payload);
        },
        receiveRoomRenderResult(payload) {
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Room renders complete." : "Room renders failed.");
          appendRoomRenderResult(payload);
          setResult(payload);
        },
        receiveFloorPlanViewerResult(payload) {
          if (payload.status !== "success") {
            appendMessage("agent", payload.error_message || "Could not open the floor-plan viewer.");
          }
          setResult(payload);
        },
        receiveImageViewerResult(payload) {
          if (payload.status !== "success") {
            appendMessage("agent", payload.error_message || "Could not open the image viewer.");
          }
          setResult(payload);
        },
        receiveEditImageResult(payload) {
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Edit complete." : "Edit failed.");
          appendEditResult(payload);
          setResult(payload);
        },
        receiveAgentResult(payload) {
          setRunning(false);
          removePendingMessage();
          setStatus(payload.status === "success" ? "Done." : "Agent failed.");
          appendAgentResult(payload);
          setResult(payload);
        },
        receiveOrchestrateResult(payload) {
          setRunning(false);
          removePendingMessage();
          if (payload.text_to_image_prompt) {
            temporaryTextToImagePrompt = payload.text_to_image_prompt;
          }
          if (payload.floor_plan_draft) {
            temporaryFloorPlanDraft = payload.floor_plan_draft;
          }
          setStatus(payload.status === "success" ? `Intent: ${payload.intent}` : "Agent failed.");
          if (payload.intent === "edit") {
            appendEditResult(payload.png || payload);
          } else if (payload.intent === "generate") {
            appendAgentResult(payload);
          } else if (payload.intent === "floor_plan_discuss") {
            appendFloorPlanDraft(payload);
          } else if (payload.intent === "floor_plan_plot") {
            appendFloorPlanResult(payload.floor_plan || payload);
          } else if (payload.intent === "room_render_generate") {
            if (payload.floor_plan) {
              lastFloorPlan = payload.floor_plan;
            }
            appendRoomRenderResult(payload.room_renders || payload, {
              floorPlan: payload.floor_plan || lastFloorPlan
            });
          } else {
            appendMessage("agent", payload.message || payload.error_message || "I need more information.");
          }
          setResult(payload);
        }
      };

      chatButton.addEventListener("click", runAgentPipeline);

      promptInput.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          runAgentPipeline();
        }
      });

      sketchup.ready();
    </script>
  </body>
</html>
